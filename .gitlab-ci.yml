image: node:18

stages:
  - prepare
  - lint
  - test
  - build
  - package
  - deploy

prepare:
  stage: prepare
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: lint
  script:
    - npm run lint
  dependencies:
    - prepare

unit-test:
  stage: test
  script:
    - npm test
  dependencies:
    - prepare

build:
  stage: build
  script:
    - npm run build
  dependencies:
    - prepare
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

package:
  stage: package
  script:
    - mkdir -p package
    - tar -czf package/application.tgz dist
  dependencies:
    - build
  artifacts:
    paths:
      - package/application.tgz
    expire_in: 1 week

deploy-production:
  stage: deploy
  script:
    - echo "Deploying application.tgz to production"
  dependencies:
    - package
  environment:
    name: production
  only:
    - main
